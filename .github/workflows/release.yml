name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ridgeline.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ridgeline
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ridgeline

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          ext=""
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then ext=".exe"; fi
          dest="ridgeline-${{ matrix.target }}${ext}"
          cp "$src" "$dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ridgeline-${{ matrix.target }}
          path: ridgeline-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
